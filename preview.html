<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Slides Remote — UI preview</title>
<style>
  body {
    margin: 0;
    padding: 24px;
    background: #1e1e1e;
    color: #ddd;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 12px; color: #aaa; }
  .stage { display: flex; flex-direction: column; gap: 8px; }
  canvas {
    image-rendering: pixelated;
    background: #000;
    border: 2px solid #333;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .meta { font-size: 11px; color: #666; max-width: 720px; }
  .controls { display: flex; flex-direction: column; gap: 12px; min-width: 260px; }
  .controls label {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 12px; color: #999;
  }
  .controls input[type="text"], .controls select {
    background: #111; color: #eee; border: 1px solid #333;
    padding: 6px 8px; border-radius: 4px; font: inherit;
  }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .row > * { flex: 1 1 0; }
  button {
    background: #2a2a2a; color: #ddd; border: 1px solid #444;
    padding: 8px 12px; border-radius: 4px; cursor: pointer; font: inherit;
  }
  button:hover { background: #333; }
  kbd {
    background: #111; border: 1px solid #444; border-radius: 3px;
    padding: 1px 5px; font-size: 11px; font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>
  <div class="stage">
    <h1>Slides Remote — UI preview (240×135, 3×)</h1>
    <canvas id="screen" width="720" height="405"></canvas>
    <div class="meta">
      Header: device name (left) + BLE state (right). Middle: pixel-art
      creature that hops in the direction of the last key, with its eyes
      always following that direction. Footer: the currently selected key.
      Press <kbd>,</kbd> <kbd>.</kbd> <kbd>;</kbd> <kbd>/</kbd> to trigger.
    </div>
  </div>

  <div class="controls">
    <h1>State</h1>
    <label>Device name
      <input type="text" id="deviceName" value="Slides Remote" />
    </label>
    <label>BLE state
      <select id="bleState">
        <option value="CONNECTED">CONNECTED</option>
        <option value="WAITING" selected>WAITING</option>
      </select>
    </label>
    <div class="row">
      <button data-key="LEFT">← LEFT</button>
      <button data-key="RIGHT">RIGHT →</button>
    </div>
    <div class="row">
      <button data-key="UP">↑ UP</button>
      <button data-key="DOWN">↓ DOWN</button>
    </div>
    <div class="row">
      <button id="connectBtn">Toggle BLE</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

<script>
const SCALE = 3;
const NATIVE_W = 240;
const NATIVE_H = 135;

const COLORS = {
  BLACK:    "#000000",
  WHITE:    "#ffffff",
  GREEN:    "#00fc00",
  YELLOW:   "#ffe000",
  DARKGREY: "#787878",
  BODY:     "#d8a25c",
  EYE:      "#ffffff",
  PUPIL:    "#111111",
  MOUTH:    "#4a2a0a",
  CHEEK:    "#ff9ab1",
  INNER_EAR:"#ff9ab1",
};

const CHAR_W = 6;
const CHAR_H = 8;

class Screen {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.ctx.imageSmoothingEnabled = false;
    this.ctx.scale(SCALE, SCALE);
    this.reset();
  }
  reset() { this.cursorX = 0; this.cursorY = 0; this.textSize = 1; this.color = COLORS.WHITE; }
  fillScreen(c) { this.ctx.fillStyle = c; this.ctx.fillRect(0, 0, NATIVE_W, NATIVE_H); this.reset(); }
  drawFastHLine(x, y, w, c) { this.ctx.fillStyle = c; this.ctx.fillRect(x, y, w, 1); }
  _pixel(x, y, c) { this.ctx.fillStyle = c; this.ctx.fillRect(x, y, 1, 1); }
  fillRect(x, y, w, h, c) { this.ctx.fillStyle = c; this.ctx.fillRect(x, y, w, h); }
  drawCircle(cx, cy, r, c) {
    let x = 0, y = r, d = 3 - 2 * r;
    const plot = (px, py) => this._pixel(px, py, c);
    while (y >= x) {
      plot(cx + x, cy + y); plot(cx - x, cy + y);
      plot(cx + x, cy - y); plot(cx - x, cy - y);
      plot(cx + y, cy + x); plot(cx - y, cy + x);
      plot(cx + y, cy - x); plot(cx - y, cy - x);
      x++;
      if (d > 0) { y--; d = d + 4 * (x - y) + 10; } else { d = d + 4 * x + 6; }
    }
  }
  fillCircle(cx, cy, r, c) {
    for (let dy = -r; dy <= r; dy++)
      for (let dx = -r; dx <= r; dx++)
        if (dx * dx + dy * dy <= r * r) this._pixel(cx + dx, cy + dy, c);
  }
  drawLine(x0, y0, x1, y1, c) {
    let dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
    let dy = -Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
    let err = dx + dy;
    for (;;) {
      this._pixel(x0, y0, c);
      if (x0 === x1 && y0 === y1) break;
      const e2 = 2 * err;
      if (e2 >= dy) { err += dy; x0 += sx; }
      if (e2 <= dx) { err += dx; y0 += sy; }
    }
  }
  setCursor(x, y) { this.cursorX = x; this.cursorY = y; }
  setTextSize(s) { this.textSize = s; }
  setTextColor(c) { this.color = c; }
  print(str) {
    const cellW = CHAR_W * this.textSize;
    const cellH = CHAR_H * this.textSize;
    const fontPx = 7 * this.textSize;
    this.ctx.fillStyle = this.color;
    this.ctx.textBaseline = "top";
    this.ctx.font = `${fontPx}px ui-monospace, "SF Mono", "Menlo", "Consolas", monospace`;
    for (const ch of String(str)) {
      if (ch === "\n") { this.cursorX = 0; this.cursorY += cellH; continue; }
      this.ctx.fillText(ch, this.cursorX, this.cursorY);
      this.cursorX += cellW;
    }
  }
}

// Pixel-art critter, 16x16. Two variants: happy (connected) and sad (waiting).
// Only rows 10-11 (mouth) differ — smile vs frown.
// .=transparent  B=body  W=eye white  M=mouth/nose  C=cheek  E=inner ear
const PET_HAPPY = [
  "...B........B...",
  "..BBB......BBB..",
  ".BEBBB....BBEBB.",
  "BBBBBBBBBBBBBBB.",
  "BBBBBBBBBBBBBBB.",
  "BBWWWBBBBBWWWBB.",
  "BBWWWBBBBBWWWBB.",
  "BBWWWBBBBBWWWBB.",
  "BBBBBBBBBBBBBBB.",
  "BCBBBBBMBBBBBCB.",
  "BBBBBMBBBMBBBBB.",
  "BBBBBBMMMBBBBBB.",
  "BBBBBBBBBBBBBBB.",
  ".BBBBBBBBBBBBB..",
  "..BBBBBBBBBBB...",
  "................",
];
const PET_SAD = [
  "...B........B...",
  "..BBB......BBB..",
  ".BEBBB....BBEBB.",
  "BBBBBBBBBBBBBBB.",
  "BBBBBBBBBBBBBBB.",
  "BBWWWBBBBBWWWBB.",
  "BBWWWBBBBBWWWBB.",
  "BBWWWBBBBBWWWBB.",
  "BBBBBBBBBBBBBBB.",
  "BCBBBBBMBBBBBCB.",
  "BBBBBBMMMBBBBBB.",
  "BBBBBMBBBMBBBBB.",
  "BBBBBBBBBBBBBBB.",
  ".BBBBBBBBBBBBB..",
  "..BBBBBBBBBBB...",
  "................",
];
const PALETTE = {
  B: COLORS.BODY, W: COLORS.EYE, M: COLORS.MOUTH,
  C: COLORS.CHEEK, E: COLORS.INNER_EAR,
};
const PET_W = 16, PET_H = 16;
const PET_SCALE = 3;

// Pupil anchor: center of the 3x3 eye white. 1x1 pupil shifts by ±1 in the
// selected direction.
const EYE_L = { cx: 3, cy: 6 };
const EYE_R = { cx: 11, cy: 6 };

const canvas = document.getElementById("screen");
const screen = new Screen(canvas);

const HEADER_Y = 1;
const DIVIDER_Y = 11;
const FOOTER_Y = 126;
const ANIM_CENTER = { x: 120, y: 72 };

const state = {
  deviceName: "Slides Remote",
  connected: false,
  direction: null, // "LEFT"|"RIGHT"|"UP"|"DOWN"|null
  pressTimeMs: -10000,
};

function hopOffset(now) {
  if (!state.direction) return { x: 0, y: 0 };
  const elapsed = now - state.pressTimeMs;
  const duration = 320;
  if (elapsed > duration) return { x: 0, y: 0 };
  // Ease-out: magnitude decays from 7 → 0
  const t = elapsed / duration;
  const mag = Math.round(7 * (1 - t) * (1 - t));
  switch (state.direction) {
    case "LEFT":  return { x: -mag, y: 0 };
    case "RIGHT": return { x:  mag, y: 0 };
    case "UP":    return { x: 0, y: -mag };
    case "DOWN":  return { x: 0, y:  mag };
  }
  return { x: 0, y: 0 };
}

function idleBob(now) {
  // Breathing: 1 pixel up/down cycling every ~1.4s
  const phase = (now % 1400) / 1400;
  return { x: 0, y: phase < 0.5 ? 0 : -1 };
}

function drawHeader() {
  screen.setTextSize(1);
  screen.setTextColor(COLORS.WHITE);
  screen.setCursor(0, HEADER_Y);
  screen.print(state.deviceName);

  const statusStr = state.connected ? "CONNECTED" : "WAITING";
  const ICON_W = 7, ICON_PAD = 2;
  const totalW = ICON_W + ICON_PAD + CHAR_W * statusStr.length;
  const startX = NATIVE_W - totalW;
  const cx = startX + (ICON_W >> 1);
  const cy = HEADER_Y + 3;
  const color = state.connected ? COLORS.GREEN : COLORS.YELLOW;
  if (state.connected) {
    screen.fillCircle(cx, cy, 3, color);
  } else {
    screen.drawCircle(cx, cy, 3, color);
    screen.drawLine(cx, cy, cx,     cy - 2, color);
    screen.drawLine(cx, cy, cx + 2, cy,     color);
  }
  screen.setTextColor(color);
  screen.setCursor(startX + ICON_W + ICON_PAD, HEADER_Y);
  screen.print(statusStr);
}

function drawPet(now) {
  const hop = hopOffset(now);
  const bob = idleBob(now);
  const renderW = PET_W * PET_SCALE;
  const renderH = PET_H * PET_SCALE;
  const ox = Math.round(ANIM_CENTER.x - renderW / 2) + hop.x;
  const oy = Math.round(ANIM_CENTER.y - renderH / 2) + hop.y + bob.y;

  const sprite = state.connected ? PET_HAPPY : PET_SAD;
  for (let row = 0; row < PET_H; row++) {
    const line = sprite[row];
    for (let col = 0; col < PET_W; col++) {
      const ch = line[col];
      if (ch === ".") continue;
      screen.fillRect(ox + col * PET_SCALE, oy + row * PET_SCALE,
                      PET_SCALE, PET_SCALE, PALETTE[ch]);
    }
  }

  // Pupils follow the last selected direction
  let dx = 0, dy = 0;
  switch (state.direction) {
    case "LEFT":  dx = -1; break;
    case "RIGHT": dx =  1; break;
    case "UP":    dy = -1; break;
    case "DOWN":  dy =  1; break;
  }
  const plotPupil = (eye) => {
    screen.fillRect(ox + (eye.cx + dx) * PET_SCALE,
                    oy + (eye.cy + dy) * PET_SCALE,
                    PET_SCALE, PET_SCALE, COLORS.PUPIL);
  };
  plotPupil(EYE_L);
  plotPupil(EYE_R);
}

function drawFooter() {
  if (!state.direction) return;
  screen.setTextSize(1);
  screen.setTextColor(COLORS.DARKGREY);
  const label = state.direction;
  const x = Math.floor((NATIVE_W - CHAR_W * label.length) / 2);
  screen.setCursor(x, FOOTER_Y);
  screen.print(label);
}

function render(now) {
  screen.fillScreen(COLORS.BLACK);
  drawHeader();
  screen.drawFastHLine(0, DIVIDER_Y, NATIVE_W, COLORS.DARKGREY);
  drawPet(now);
  drawFooter();
  requestAnimationFrame(render);
}

// Controls
const $ = (id) => document.getElementById(id);

$("deviceName").addEventListener("input", (e) => { state.deviceName = e.target.value; });
$("bleState").addEventListener("change", (e) => { state.connected = e.target.value === "CONNECTED"; });

function simulatePress(label) {
  state.direction = label;
  state.pressTimeMs = performance.now();
}
document.querySelectorAll("button[data-key]").forEach((btn) => {
  btn.addEventListener("click", () => simulatePress(btn.dataset.key));
});
$("connectBtn").addEventListener("click", () => {
  state.connected = !state.connected;
  $("bleState").value = state.connected ? "CONNECTED" : "WAITING";
});
$("resetBtn").addEventListener("click", () => {
  state.deviceName = "Slides Remote";
  state.connected = false;
  state.direction = null;
  state.pressTimeMs = -10000;
  $("deviceName").value = state.deviceName;
  $("bleState").value = "WAITING";
});

const keyMap = { ",": "LEFT", ".": "DOWN", ";": "UP", "/": "RIGHT" };
window.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  const label = keyMap[e.key];
  if (!label) return;
  e.preventDefault();
  simulatePress(label);
});

requestAnimationFrame(render);
</script>
</body>
</html>
