name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Install project dependencies
        run: pio pkg install -e cardputer-adv

      - name: Patch BleKeyboard.h (add missing <functional>)
        run: |
          FILE=".pio/libdeps/cardputer-adv/ESP32 BLE Keyboard/src/BleKeyboard.h"
          if ! grep -q '#include <functional>' "$FILE"; then
            sed -i '/#include <Print.h>/a #include <functional>' "$FILE"
          fi

      - name: Build firmware
        run: pio run -e cardputer-adv

      - name: Rename artifact with tag version
        run: mv firmware.bin "presentation-remote ${{ github.ref_name }}.bin"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            presentation-remote ${{ github.ref_name }}.bin
          generate_release_notes: true
